name: Run setup-nix
description: Set up Nix environment for GitHub Actions
runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - name: Setup niks3
      uses: Mic92/niks3-action@bc010bf9dbc79ec59de6c79b1e7a167977d3978b # v1.0.0
      with:
        server-url: https://niks3.yutakobayashi.com
